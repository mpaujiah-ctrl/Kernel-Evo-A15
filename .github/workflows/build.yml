name: Kernel Evo A15 (vic) - KSUN Manual Hook (5 fungsi) + SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone kernel source (Evolution-X-Devices, branch vic / A15)
        run: git clone --depth=1 -b vic https://github.com/Evolution-X-Devices/kernel_xiaomi_cepheus kernel

      - name: Install toolchain (clang + GNU cross-compiler)
        run: |
          sudo apt update
          sudo apt install -y clang lld llvm bc bison flex libssl-dev libelf-dev build-essential patch
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone AnyKernel3
        run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3

      - name: Install KernelSU-Next (legacy mode untuk non-GKI)
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

      - name: Enable CONFIG_KSU + Manual Hook mode di defconfig
        run: |
          cd kernel
          grep -q "CONFIG_KSU=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KSU=y" >> arch/arm64/configs/cepheus_defconfig
          grep -q "CONFIG_KPROBES=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KPROBES=y" >> arch/arm64/configs/cepheus_defconfig
          grep -q "CONFIG_HAVE_KPROBES=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_KPROBES_HOOK=n" >> arch/arm64/configs/cepheus_defconfig
          sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="-EvolutionX_cepheus_v3.2.0_KSUN"/' arch/arm64/configs/cepheus_defconfig

      # --- 5 HOOK RESMI, wajib untuk CONFIG_KSU_MANUAL_HOOK ---
      - name: Patch 1/5 - kernel/reboot.c (ksu_handle_sys_reboot)
        run: |
          cd kernel
          cat > /tmp/01_reboot.patch << 'ENDPATCH'
--- a/kernel/reboot.c
+++ b/kernel/reboot.c
@@ -274,6 +274,11 @@
  *
  * reboot doesn't sync: do that yourself before calling this.
  */
+
+#ifdef CONFIG_KSU
+extern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg);
+#endif
+
 SYSCALL_DEFINE4(reboot, int, magic1, int, magic2, unsigned int, cmd,
 		void __user *, arg)
 {
 	struct pid_namespace *pid_ns = task_active_pid_ns(current);
 	char buffer[256];
 	int ret = 0;
 
+#ifdef CONFIG_KSU
+	ksu_handle_sys_reboot(magic1, magic2, cmd, &arg);
+#endif
 	/* We only trust the superuser with rebooting the system. */
 	if (!ns_capable(pid_ns->user_ns, CAP_SYS_BOOT))
 		return -EPERM;
ENDPATCH
          patch -p1 --fuzz=5 < /tmp/01_reboot.patch || echo "GAGAL - cek manual"

      - name: Patch 2/5 - fs/exec.c (ksu_handle_execveat)
        run: |
          cd kernel
          cat > /tmp/02_exec.patch << 'ENDPATCH'
--- a/fs/exec.c
+++ b/fs/exec.c
@@ -1886,12 +1886,26 @@ static int do_execveat_common(int fd, struct filename *filename,
 	return retval;
 }
 
+#ifdef CONFIG_KSU
+extern int ksu_handle_execveat(int *fd, struct filename **filename_ptr,
+				void *argv, void *envp, int *flags);
+#endif
+
 int do_execve(struct filename *filename,
 	const char __user *const __user *__argv,
 	const char __user *const __user *__envp)
 {
 	struct user_arg_ptr argv = { .ptr.native = __argv };
 	struct user_arg_ptr envp = { .ptr.native = __envp };
+#ifdef CONFIG_KSU
+	ksu_handle_execveat((int *)AT_FDCWD, &filename, &argv, &envp, 0);
+#endif
 	return do_execveat_common(AT_FDCWD, filename, argv, envp, 0);
 }
ENDPATCH
          patch -p1 --fuzz=5 < /tmp/02_exec.patch || echo "GAGAL - cek manual"

      - name: Patch 3/5 - fs/open.c (ksu_handle_faccessat)
        run: |
          cd kernel
          cat > /tmp/03_open.patch << 'ENDPATCH'
--- a/fs/open.c
+++ b/fs/open.c
@@ -350,6 +350,10 @@
  * We do this by temporarily clearing all FS-related capabilities and
  * switching the fsuid/fsgid around to the real ones.
  */
+#ifdef CONFIG_KSU
+extern int ksu_handle_faccessat(int *dfd, const char __user **filename_user,
+				int *mode, int *flags);
+#endif
 SYSCALL_DEFINE3(faccessat, int, dfd, const char __user *, filename, int, mode)
 {
 	const struct cred *old_cred;
@@ -359,6 +363,9 @@ SYSCALL_DEFINE3(faccessat, int, dfd, const char __user *, filename, int, mode)
 	int res;
 	unsigned int lookup_flags = LOOKUP_FOLLOW;
 
+#ifdef CONFIG_KSU
+	ksu_handle_faccessat(&dfd, &filename, &mode, NULL);
+#endif
 	if (mode & ~S_IRWXO)
 		return -EINVAL;
ENDPATCH
          patch -p1 --fuzz=5 < /tmp/03_open.patch || echo "GAGAL - cek manual"

      - name: Patch 4/5 - fs/read_write.c (ksu_handle_sys_read)
        run: |
          cd kernel
          cat > /tmp/04_readwrite.patch << 'ENDPATCH'
--- a/fs/read_write.c
+++ b/fs/read_write.c
@@ -568,11 +568,21 @@ static inline void file_pos_write(struct file *file, loff_t pos)
 		file->f_pos = pos;
 }
 
+#ifdef CONFIG_KSU
+extern bool ksu_vfs_read_hook __read_mostly;
+extern int ksu_handle_sys_read(unsigned int fd,
+				char __user **buf_ptr, size_t *count_ptr);
+#endif
+
 SYSCALL_DEFINE3(read, unsigned int, fd, char __user *, buf, size_t, count)
 {
 	struct fd f = fdget_pos(fd);
 	ssize_t ret = -EBADF;
 
+#ifdef CONFIG_KSU
+	if (unlikely(ksu_vfs_read_hook))
+		ksu_handle_sys_read(fd, &buf, &count);
+#endif
 	if (f.file) {
 		loff_t pos = file_pos_read(f.file);
 		ret = vfs_read(f.file, buf, count, &pos);
ENDPATCH
          patch -p1 --fuzz=5 < /tmp/04_readwrite.patch || echo "GAGAL - cek manual"

      - name: Patch 5/5 - fs/stat.c (ksu_handle_stat)
        run: |
          cd kernel
          cat > /tmp/05_stat.patch << 'ENDPATCH'
--- a/fs/stat.c
+++ b/fs/stat.c
@@ -353,6 +353,11 @@ SYSCALL_DEFINE2(newlstat, const char __user *, filename,
 	return cp_new_stat(&stat, statbuf);
 }
 
+#ifdef CONFIG_KSU
+extern int ksu_handle_stat(int *dfd, const char __user **filename_user,
+				int *flags);
+#endif
+
 #if !defined(__ARCH_WANT_STAT64) || defined(__ARCH_WANT_SYS_NEWFSTATAT)
 SYSCALL_DEFINE4(newfstatat, int, dfd, const char __user *, filename,
 		struct stat __user *, statbuf, int, flag)
@@ -360,6 +365,9 @@ SYSCALL_DEFINE4(newfstatat, int, dfd, const char __user *, filename,
 	struct kstat stat;
 	int error;
 
+#ifdef CONFIG_KSU
+	ksu_handle_stat(&dfd, &filename, &flag);
+#endif
 	error = vfs_fstatat(dfd, filename, &stat, flag);
 	if (error)
 		return error;
ENDPATCH
          patch -p1 --fuzz=5 < /tmp/05_stat.patch || echo "GAGAL - cek manual"

      - name: Fix yamltree.c (stub kosong)
        run: |
          cd kernel
          cat > scripts/dtc/yamltree.c << 'CEOF'
          #include <stdio.h>
          #include <stdlib.h>
          struct dt_info;
          void dt_to_yaml(FILE *outf, struct dt_info *dti) {}
          CEOF

      - name: Upgrade SUSFS ke v2.1.0
        run: |
          cd kernel
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/susfs.c" -o fs/susfs.c
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs.h" -o include/linux/susfs.h
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs_def.h" -o include/linux/susfs_def.h

      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64
          export LLVM=1
          export CC=clang
          export AR=llvm-ar
          export LD=ld.lld
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export USE_CCACHE=1
          make O=out ARCH=arm64 cepheus_defconfig
          make ARCH=arm64 O=out CC=clang AR=llvm-ar LD=ld.lld NM=llvm-nm \
               OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
               -j$(nproc --all) Image.gz-dtb
          ls out/arch/arm64/boot/Image.gz-dtb

      - name: Pack AnyKernel3
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3 && zip -r9 ../EvoX_cepheus_vic_v3.2.0_KSUN.zip * -x README

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EvoX-cepheus-vic-v3.2.0-KSUN
          path: |
            EvoX_cepheus_vic_v3.2.0_KSUN.zip
            kernel/out/arch/arm64/boot/Image.gz-dtb
