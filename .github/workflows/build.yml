name: Kernel Evo A15 - Baseline Test (tanpa upgrade KSUN)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone kernel source (Evolution-X, branch vic)
        run: git clone --depth=1 -b vic https://github.com/Evolution-X-Devices/kernel_xiaomi_cepheus kernel

      - name: Install toolchain (clang + GNU cross-compiler)
        run: |
          sudo apt update
          sudo apt install -y clang lld llvm bc bison flex libssl-dev libelf-dev build-essential
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone AnyKernel3
        run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3

      - name: Fix yamltree.c (stub kosong, solusi dari TURTLE)
        run: |
          cd kernel
          cat > scripts/dtc/yamltree.c << 'CEOF'
          #include <stdio.h>
          #include <stdlib.h>

          struct dt_info;

          void dt_to_yaml(FILE *outf, struct dt_info *dti) {}
          CEOF
          echo "yamltree.c replaced with stub"

      - name: Cek versi KSUN default yang sudah ada di repo (info saja)
        run: |
          cd kernel
          echo "=== Isi folder KernelSU-Next bawaan repo ==="
          ls -la KernelSU-Next/ 2>/dev/null || echo "Folder KernelSU-Next tidak ada"
          echo ""
          echo "=== Cek CONFIG_KSU di cepheus_defconfig bawaan ==="
          grep "CONFIG_KSU" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KSU tidak diset"

      - name: Build kernel (BASELINE - tanpa modifikasi KSUN apapun)
        run: |
          cd kernel
          export ARCH=arm64
          export LLVM=1
          export CC=clang
          export AR=llvm-ar
          export LD=ld.lld
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export USE_CCACHE=1
          make O=out ARCH=arm64 cepheus_defconfig
          make ARCH=arm64 \
               O=out \
               CC=clang \
               AR=llvm-ar \
               LD=ld.lld \
               NM=llvm-nm \
               OBJCOPY=llvm-objcopy \
               OBJDUMP=llvm-objdump \
               STRIP=llvm-strip \
               -j$(nproc --all) Image.gz-dtb
          echo "=== Verify Image.gz-dtb ==="
          ls out/arch/arm64/boot/Image.gz-dtb

      - name: Pack AnyKernel3
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3 && zip -r9 ../Evo_cepheus_BASELINE_test.zip * -x README

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Evo-cepheus-BASELINE-test
          path: |
            Evo_cepheus_BASELINE_test.zip
            kernel/out/arch/arm64/boot/Image.gz-dtb
            
