name: Kernel Evo A15 - Upgrade KSUN 3.2.0

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone kernel source (raystef66, branch 15.0)
        run: git clone --depth=1 -b bka https://github.com/Evolution-X-Devices/kernel_xiaomi_cepheus kernel

      - name: Upgrade KernelSU-Next dari v1.39 (81dff86) ke v3.2.0 (00cb93e)
        run: |
          cd kernel
          rm -rf KernelSU-Next
          mkdir -p KernelSU-Next
          curl -sL "https://github.com/rifsxd/KernelSU-Next/archive/00cb93e0bc8bf3ca3680c7e8a3d7cf11d0b59071.tar.gz" -o ksun.tar.gz
          tar -xzf ksun.tar.gz -C KernelSU-Next --strip-components=1
          rm ksun.tar.gz
          ls KernelSU-Next/kernel/

      - name: Fix KSU_VERSION fallback (karena pakai tarball, bukan git clone)
        run: |
          cd kernel
          sed -i 's/KSU_VERSION_FALLBACK := 1/KSU_VERSION_FALLBACK := 33129/' KernelSU-Next/kernel/Kbuild
          grep "KSU_VERSION_FALLBACK" KernelSU-Next/kernel/Kbuild
      
      - name: Update defconfig localversion
        run: |
          cd kernel
          echo 'CONFIG_LOCALVERSION="-EvolutionX_cepheus_v3.2.0_KSUN"' >> arch/arm64/configs/defconfig
          grep "CONFIG_LOCALVERSION" arch/arm64/configs/defconfig

      - name: Install toolchain (clang-19 + GNU cross-compiler)
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 19
          sudo apt update
          sudo apt install -y clang-19 lld-19 llvm-19 bc bison flex libssl-dev libelf-dev build-essential
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

          # Buat alias biar 'clang', 'ld.lld', dll otomatis mengarah ke versi 19
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-19 100
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-19 100
          sudo update-alternatives --install /usr/bin/llvm-ar llvm-ar /usr/bin/llvm-ar-19 100
          sudo update-alternatives --install /usr/bin/llvm-nm llvm-nm /usr/bin/llvm-nm-19 100
          sudo update-alternatives --install /usr/bin/llvm-objcopy llvm-objcopy /usr/bin/llvm-objcopy-19 100
          sudo update-alternatives --install /usr/bin/llvm-objdump llvm-objdump /usr/bin/llvm-objdump-19 100
          sudo update-alternatives --install /usr/bin/llvm-strip llvm-strip /usr/bin/llvm-strip-19 100

          clang --version
      
      - name: Clone AnyKernel3
        run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3

      - name: Fix yamltree.c (stub kosong, solusi dari TURTLE)
        run: |
          cd kernel
          cat > scripts/dtc/yamltree.c << 'CEOF'
          #include <stdio.h>
          #include <stdlib.h>
          
          struct dt_info;
          
          void dt_to_yaml(FILE *outf, struct dt_info *dti) {}
          CEOF
          echo "yamltree.c replaced with stub"
      
      - name: Inject manual hook ke kernel/reboot.c (required by KSUN 3.2.0 Kbuild check)
        run: |
          cd kernel
          if ! grep -q "ksu_handle_sys_reboot" kernel/reboot.c; then
            sed -i '/^SYSCALL_DEFINE4(reboot/i extern int ksu_handle_sys_reboot(int magic1, int magic2, unsigned int cmd, void __user **arg4);' kernel/reboot.c
            sed -i '/if (magic1 != LINUX_REBOOT_MAGIC1/i \\tksu_handle_sys_reboot(magic1, magic2, cmd, (void __user **)&arg);' kernel/reboot.c
            echo "=== Hook injected ==="
            grep -n "ksu_handle_sys_reboot" kernel/reboot.c
          else
            echo "=== Hook sudah ada ==="
          fi
      
      - name: Commit perubahan lokal sebelum cherry-pick
        run: |
          cd kernel
          git config user.email "ci@build.local"
          git config user.name "CI Build"
          git add -A
          git commit -m "local changes: defconfig + reboot.c hook" || echo "nothing to commit"
      
      - name: Upgrade SUSFS ke v2.1.0 (sinkron sama KSUN 3.2.0)
        run: |
          cd kernel
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/susfs.c" -o fs/susfs.c
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs.h" -o include/linux/susfs.h
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs_def.h" -o include/linux/susfs_def.h
          grep "SUSFS_VERSION" include/linux/susfs.h

      - name: Sinkronkan fs/stat.c dengan SUSFS v2.1.0 (fix undefined symbol)
        run: |
          cd kernel
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/stat.c" -o fs/stat.c
          grep -c "susfs" fs/stat.c

      - name: Sinkronkan fs/proc/task_mmu.c juga (biasanya sepaket sama stat.c)
        run: |
          cd kernel
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/proc/task_mmu.c" -o fs/proc/task_mmu.c
          grep -c "susfs" fs/proc/task_mmu.c
                  
      - name: DEBUG - cek konteks split_huge_pmd di task_mmu.c
        run: |
          cd kernel
          echo "=== Baris 1700-1725 task_mmu.c ==="
          sed -n '1700,1725p' fs/proc/task_mmu.c
          echo ""
          echo "=== Definisi split_huge_pmd di huge_mm.h ==="
          grep -n -A 15 "define split_huge_pmd" include/linux/huge_mm.h
      
      - name: Fix typo bug ptep->pte di hugetlbpage.c
        run: |
          cd kernel
          sed -i 's/ptep = huge_pmd_share(mm, vma, addr, pud);/pte = huge_pmd_share(mm, vma, addr, pud);/' arch/arm64/mm/hugetlbpage.c
          grep -n "huge_pmd_share(mm, vma, addr, pud)" arch/arm64/mm/hugetlbpage.c

      - name: Fix pids[PIDTYPE_PID] -> task_pid() di kvm_main.c
        run: |
          cd kernel
          sed -i 's/current->pids\[PIDTYPE_PID\]\.pid/task_pid(current)/' virt/kvm/kvm_main.c
          grep -n "task_pid(current)" virt/kvm/kvm_main.c
      
      - name: Build kernel (pakai flag dari build.sh asli raystef66)
        run: |
          cd kernel
          export ARCH=arm64
          export LLVM=1
          export CC=clang
          export AR=llvm-ar
          export LD=ld.lld
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export USE_CCACHE=1

          mkdir -p out
          bash scripts/kconfig/merge_config.sh -O out \
            arch/arm64/configs/defconfig \
            arch/arm64/configs/vendor/sm8150-perf_defconfig \
            arch/arm64/configs/vendor/xiaomi/sm8150-common.config \
            arch/arm64/configs/vendor/xiaomi/cepheus.config

          make ARCH=arm64 \
               O=out \
               CC=clang \
               AR=llvm-ar \
               LD=ld.lld \
               NM=llvm-nm \
               OBJCOPY=llvm-objcopy \
               OBJDUMP=llvm-objdump \
               STRIP=llvm-strip \
               -j$(nproc --all) Image.gz-dtb

          echo "=== Verify Image.gz-dtb ==="
          ls out/arch/arm64/boot/Image.gz-dtb

      - name: Pack AnyKernel3
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3 && zip -r9 ../Evo_cepheus_v3.2.0_KSUN.zip * -x README

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Evo-cepheus-v3.2.0-KSUN
          path: |
            Evo_cepheus_v3.2.0_KSUN.zip
            kernel/out/arch/arm64/boot/Image.gz-dtb     
