name: Kernel Evo A15 - Baseline Test (clang AOSP r536225)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone kernel source (Evolution-X, branch vic)
        run: git clone --depth=1 -b vic https://github.com/Evolution-X-Devices/kernel_xiaomi_cepheus kernel

      - name: Download & extract clang AOSP r536225 (toolchain resmi, bukan clang distro)
        run: |
          mkdir -p clang-r536225
          curl -sL "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main-kernel/clang-r536225.tar.gz" | tar -xz -C clang-r536225
          echo "=== Verify clang ==="
          ./clang-r536225/bin/clang --version

      - name: Install GNU cross-compiler (buat CROSS_COMPILE_ARM32 & binutils)
        run: |
          sudo apt update
          sudo apt install -y bc bison flex libssl-dev libelf-dev build-essential
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone AnyKernel3
        run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3

      - name: Fix yamltree.c (stub kosong, solusi dari TURTLE)
        run: |
          cd kernel
          cat > scripts/dtc/yamltree.c << 'CEOF'
          #include <stdio.h>
          #include <stdlib.h>

          struct dt_info;

          void dt_to_yaml(FILE *outf, struct dt_info *dti) {}
          CEOF
          echo "yamltree.c replaced with stub"

      - name: Build kernel (BASELINE - pakai clang AOSP r536225, tanpa modifikasi KSUN)
        run: |
          cd kernel
          export PATH="${GITHUB_WORKSPACE}/clang-r536225/bin:${PATH}"
          export ARCH=arm64
          export LLVM=1
          export CC=clang
          export AR=llvm-ar
          export LD=ld.lld
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export USE_CCACHE=1
          make O=out ARCH=arm64 cepheus_defconfig
          make ARCH=arm64 \
               O=out \
               CC=clang \
               AR=llvm-ar \
               LD=ld.lld \
               NM=llvm-nm \
               OBJCOPY=llvm-objcopy \
               OBJDUMP=llvm-objdump \
               STRIP=llvm-strip \
               -j$(nproc --all) Image.gz-dtb
          echo "=== Verify Image.gz-dtb ==="
          ls out/arch/arm64/boot/Image.gz-dtb

      - name: Pack AnyKernel3
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3 && zip -r9 ../Evo_cepheus_BASELINE_clangAOSP_test.zip * -x README

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Evo-cepheus-BASELINE-clangAOSP-test
          path: |
            Evo_cepheus_BASELINE_clangAOSP_test.zip
            kernel/out/arch/arm64/boot/Image.gz-dtb
            
