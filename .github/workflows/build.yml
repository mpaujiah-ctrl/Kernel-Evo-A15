name: Kernel Evo A15 (vic) - KSUN Manual Hook (5 fungsi) + SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone kernel source (Evolution-X-Devices, branch vic / A15)
        run: git clone --depth=1 -b vic https://github.com/Evolution-X-Devices/kernel_xiaomi_cepheus kernel

      - name: Install toolchain (clang + GNU cross-compiler)
        run: |
          sudo apt update
          sudo apt install -y clang lld llvm bc bison flex libssl-dev libelf-dev build-essential patch
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone AnyKernel3
        run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3

      - name: Install KernelSU-Next (legacy mode untuk non-GKI)
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

      - name: Enable CONFIG_KSU + Manual Hook mode di defconfig
        run: |
          cd kernel
          grep -q "CONFIG_KSU=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KSU=y" >> arch/arm64/configs/cepheus_defconfig
          grep -q "CONFIG_KPROBES=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KPROBES=y" >> arch/arm64/configs/cepheus_defconfig
          grep -q "CONFIG_HAVE_KPROBES=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/cepheus_defconfig
          echo "CONFIG_KSU_KPROBES_HOOK=n" >> arch/arm64/configs/cepheus_defconfig
          sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="-EvolutionX_cepheus_v3.2.0_KSUN"/' arch/arm64/configs/cepheus_defconfig

      - name: Apply 5 hook manual KSU via Python script
        run: |
          cp patches/apply_ksu_patches.py kernel/
          cd kernel
          python3 apply_ksu_patches.py

      - name: Fix yamltree.c (stub kosong)
        run: |
          cd kernel
          cat > scripts/dtc/yamltree.c << 'CEOF'
          #include <stdio.h>
          #include <stdlib.h>
          struct dt_info;
          void dt_to_yaml(FILE *outf, struct dt_info *dti) {}
          CEOF

      - name: Upgrade SUSFS ke v2.1.0
        run: |
          cd kernel
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/susfs.c" -o fs/susfs.c
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs.h" -o include/linux/susfs.h
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs_def.h" -o include/linux/susfs_def.h

      - name: Ganti selinux_hide.c dan kernel_umount.c jadi stub kosong
        run: |
          cd kernel
          # Kembalikan dulu baris Kbuild yang sempat di-comment
          sed -i 's/^#kernelsu-objs += feature\/kernel_umount.o/kernelsu-objs += feature\/kernel_umount.o/' drivers/kernelsu/Kbuild
          sed -i 's/^#kernelsu-objs += feature\/selinux_hide.o/kernelsu-objs += feature\/selinux_hide.o/' drivers/kernelsu/Kbuild
          grep -n "selinux_hide\|kernel_umount" drivers/kernelsu/Kbuild
      
          # Stub kernel_umount.c
          cat > drivers/kernelsu/feature/kernel_umount.c << 'EOF'
          #include <linux/types.h>
          void ksu_handle_umount(void) {}
          int ksu_kernel_umount_init(void) { return 0; }
          void ksu_kernel_umount_exit(void) {}
          EOF
          
              # Stub selinux_hide.c
              cat > drivers/kernelsu/feature/selinux_hide.c << 'EOF'
          #include <linux/types.h>
          int ksu_selinux_hide_init(void) { return 0; }
          void ksu_selinux_hide_exit(void) {}
          EOF
          
              echo "=== Verify stub ==="
              cat drivers/kernelsu/feature/kernel_umount.c
              cat drivers/kernelsu/feature/selinux_hide.c
      
      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64
          export LLVM=1
          export CC=clang
          export AR=llvm-ar
          export LD=ld.lld
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export USE_CCACHE=1
          make O=out ARCH=arm64 cepheus_defconfig
          make ARCH=arm64 O=out CC=clang AR=llvm-ar LD=ld.lld NM=llvm-nm \
               OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
               -j$(nproc --all) Image.gz-dtb
          ls out/arch/arm64/boot/Image.gz-dtb
      
      - name: Download boot.img referensi dari Google Drive
        run: |
          pip install gdown --break-system-packages
          gdown "https://drive.google.com/file/d/108P6Te2rGQ0dbxuXS4TU0xMKTpjepk8F/view?usp=drive_link" -O reference_boot.img
          echo "=== Verify ukuran file ==="
          ls -la reference_boot.img
          file reference_boot.img

      - name: Download magiskboot
        run: |
          curl -sL "https://github.com/topjohnwu/Magisk/raw/master/app/src/main/jniLibs/x86_64/libmagiskboot.so" -o magiskboot
          chmod +x magiskboot

      - name: Unpack boot.img referensi, ganti kernel, repack
        run: |
          mkdir -p bootimg_work && cd bootimg_work
          cp ../reference_boot.img .
          cp ../magiskboot .
          ./magiskboot unpack reference_boot.img
          cp ../kernel/out/arch/arm64/boot/Image.gz-dtb kernel
          ./magiskboot repack reference_boot.img new-boot.img
          echo "=== Verify ==="
          ls -la new-boot.img

      - name: Upload artifact (boot.img)
        uses: actions/upload-artifact@v4
        with:
          name: EvoX-cepheus-vic-v3.2.0-KSUN-bootimg
          path: bootimg_work/new-boot.img
