name: Kernel Build Test (cepheus - vic, clean/no patch)

on:
  workflow_dispatch:      # cuma bisa di-trigger manual dari tab Actions

env:
  KERNEL_REPO: https://github.com/Evolution-X-Devices/kernel_xiaomi_cepheus
  KERNEL_BRANCH: vic
  DEFCONFIG: cepheus_defconfig
  ARCH: arm64
  SUBARCH: arm64
  CLANG_REPO: https://gitlab.com/jjpprrrr/prelude-clang.git
  ANYKERNEL_REPO: https://github.com/osm0sis/AnyKernel3
  ANYKERNEL_BRANCH: master

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo rm -rf /usr/local/lib/android

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison flex libssl-dev libelf-dev libyaml-dev \
            build-essential python3 python-is-python3 \
            git curl zip unzip \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi \
            ccache

      - name: Clone kernel source (clean, no patch)
        run: |
          git clone --depth=1 -b "${KERNEL_BRANCH}" "${KERNEL_REPO}" kernel
          cd kernel
          echo "Commit yang dipakai:"
          git log -1 --oneline

      - name: Clone Clang toolchain
        run: |
          git clone --depth=1 "${CLANG_REPO}" clang

      - name: Clone AnyKernel3
        run: |
          git clone --depth=1 -b "${ANYKERNEL_BRANCH}" "${ANYKERNEL_REPO}" anykernel

      - name: Configure anykernel.sh for cepheus (A/B slot device)
        run: |
          cd anykernel
          sed -i 's/^BLOCK=.*/BLOCK=\/dev\/block\/bootdevice\/by-name\/boot;/' anykernel.sh
          sed -i 's/^IS_SLOT_DEVICE=.*/IS_SLOT_DEVICE=1;/' anykernel.sh
          sed -i "s/^kernel\.string=.*/kernel.string=Evolution-X cepheus vic (no patch, CI build)/" anykernel.sh
          sed -i 's/^device\.name1=.*/device.name1=cepheus;/' anykernel.sh
          echo "--- Cek hasil konfigurasi anykernel.sh ---"
          grep -E "^(BLOCK|IS_SLOT_DEVICE|kernel.string|device.name1)=" anykernel.sh

      - name: Setup ccache
        run: |
          echo "CCACHE_DIR=${HOME}/.ccache" >> "$GITHUB_ENV"
          mkdir -p "${HOME}/.ccache"

      - name: Cache ccache directory
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-cepheus-vic-${{ github.run_id }}
          restore-keys: |
            ccache-cepheus-vic-

      - name: Verify cross toolchain is correct
        run: |
          echo "--- aarch64 linker ---"
          which aarch64-linux-gnu-ld
          aarch64-linux-gnu-ld --version | head -1
          echo "--- arm32 linker ---"
          which arm-linux-gnueabi-ld
          arm-linux-gnueabi-ld --version | head -1
          echo "--- host system linker (buat host tool spt dtc) ---"
          /usr/bin/ld --version | head -1
          echo "--- libyaml header & lib ---"
          ls -la /usr/include/yaml.h
          find /usr/lib -name "libyaml*" 2>/dev/null

      - name: Generate defconfig
        working-directory: kernel
        shell: bash
        run: |
          set -o pipefail
          export PATH="${GITHUB_WORKSPACE}/clang/bin:${PATH}"
          make O=out \
            ARCH=${ARCH} SUBARCH=${SUBARCH} \
            CC="ccache clang" \
            HOSTCC=gcc \
            HOSTCXX=g++ \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            LD=ld.lld \
            LD_COMPAT=arm-linux-gnueabi-ld \
            ${DEFCONFIG}

      - name: Build kernel (compile test)
        working-directory: kernel
        shell: bash
        run: |
          set -o pipefail
          export PATH="${GITHUB_WORKSPACE}/clang/bin:${PATH}"
          make O=out -j"$(nproc)" \
            ARCH=${ARCH} SUBARCH=${SUBARCH} \
            CC="ccache clang" \
            HOSTCC=gcc \
            HOSTCXX=g++ \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            LD=ld.lld \
            LD_COMPAT=arm-linux-gnueabi-ld 2>&1 | tee out/build.log

      - name: Verify output image exists
        working-directory: kernel
        run: |
          IMG="out/arch/arm64/boot/Image.gz-dtb"
          if [ -f "$IMG" ]; then
            echo "BUILD OK: $IMG berhasil dibuat"
            ls -la "$IMG"
          else
            echo "BUILD GAGAL: Image.gz-dtb tidak ditemukan"
            echo "Cek out/build.log untuk detail error"
            exit 1
          fi

      - name: Upload build log (selalu, buat debug kalau gagal)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/out/build.log
          retention-days: 7

      - name: Package flashable zip (AnyKernel3)
        if: success()
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb anykernel/Image.gz-dtb
          # dtbo.img opsional, sertakan kalau ada
          if [ -f kernel/out/arch/arm64/boot/dtbo.img ]; then
            cp kernel/out/arch/arm64/boot/dtbo.img anykernel/dtbo.img
          fi
          cd anykernel
          ZIP_NAME="cepheus-vic-nopatch-$(date +%Y%m%d-%H%M).zip"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"
          zip -r9 "../${ZIP_NAME}" . -x ".git*" -x "README.md"

      - name: Upload flashable zip
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 14
