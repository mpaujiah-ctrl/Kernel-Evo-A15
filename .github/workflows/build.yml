name: Kernel Evo A15 (vic) - KSUN legacy + SUSFS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone kernel source (Evolution-X-Devices, branch vic / A15)
        run: git clone --depth=1 -b vic https://github.com/Evolution-X-Devices/kernel_xiaomi_cepheus kernel

      - name: Install toolchain (clang + GNU cross-compiler)
        run: |
          sudo apt update
          sudo apt install -y clang lld llvm bc bison flex libssl-dev libelf-dev build-essential
          sudo apt install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi

      - name: Clone AnyKernel3
        run: git clone --depth=1 https://github.com/osm0sis/AnyKernel3

      - name: Install KernelSU-Next (legacy mode untuk non-GKI)
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy
          echo "=== Verify syscall_fn_t terdefinisi ==="
          grep -rn "syscall_fn_t" KernelSU-Next/ | head -5
          echo "=== Verify wiring ==="
          grep -n "kernelsu" drivers/Makefile drivers/Kconfig

      - name: Enable CONFIG_KSU + CONFIG_KPROBES di defconfig
        run: |
          cd kernel
          grep -q "CONFIG_KSU=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KSU=y" >> arch/arm64/configs/cepheus_defconfig
          grep -q "CONFIG_KPROBES=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KPROBES=y" >> arch/arm64/configs/cepheus_defconfig
          grep -q "CONFIG_HAVE_KPROBES=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_HAVE_KPROBES=y" >> arch/arm64/configs/cepheus_defconfig
          grep -q "CONFIG_KPROBE_EVENTS=y" arch/arm64/configs/cepheus_defconfig || echo "CONFIG_KPROBE_EVENTS=y" >> arch/arm64/configs/cepheus_defconfig
          sed -i 's/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION="-EvolutionX_cepheus_v3.2.0_KSUN"/' arch/arm64/configs/cepheus_defconfig
          grep "CONFIG_KSU\|CONFIG_KPROBE\|CONFIG_LOCALVERSION" arch/arm64/configs/cepheus_defconfig

      - name: Fix yamltree.c (stub kosong)
        run: |
          cd kernel
          cat > scripts/dtc/yamltree.c << 'CEOF'
          #include <stdio.h>
          #include <stdlib.h>
          struct dt_info;
          void dt_to_yaml(FILE *outf, struct dt_info *dti) {}
          CEOF

      - name: Upgrade SUSFS ke v2.1.0 (file sama dengan build InfiniR sukses)
        run: |
          cd kernel
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/susfs.c" -o fs/susfs.c
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs.h" -o include/linux/susfs.h
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/include/linux/susfs_def.h" -o include/linux/susfs_def.h
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/stat.c" -o fs/stat.c
          curl -sL "https://raw.githubusercontent.com/raystef66/kernel_xiaomi_cepheus/16.0-ksun/fs/proc/task_mmu.c" -o fs/proc/task_mmu.c
          grep "SUSFS_VERSION" include/linux/susfs.h

      - name: Debug lengkap - fitur input/umount dan opsi disable
  run: |
    cd kernel
    echo "=== SEMUA file Kconfig di KernelSU-Next ==="
    find KernelSU-Next -name "Kconfig" -exec echo "--- {} ---" \; -exec cat {} \;
    
    echo ""
    echo "=== Cari kata kunci UMOUNT/INPUT/SELINUX di seluruh Kconfig ==="
    grep -rn "UMOUNT\|INPUT_HOOK\|SELINUX_HIDE" KernelSU-Next/ --include="Kconfig"
    
    echo ""
    echo "=== Cek Makefile yang mengaitkan kernel_umount.c dan selinux_hide.c ==="
    find KernelSU-Next -name "Makefile" -exec grep -l "kernel_umount\|selinux_hide" {} \;
    find KernelSU-Next -name "Makefile" | xargs grep -n "kernel_umount\|selinux_hide"
    
    echo ""
    echo "=== Isi definisi/pemanggilan path_umount ==="
    grep -rn "path_umount" KernelSU-Next/ fs/ include/ 2>/dev/null
    
    echo ""
    echo "=== Isi definisi/pemanggilan ksu_input_hook ==="
    grep -rn "ksu_input_hook" KernelSU-Next/ drivers/input/ 2>/dev/null
      
      - name: Build kernel
        run: |
          cd kernel
          export ARCH=arm64
          export LLVM=1
          export CC=clang
          export AR=llvm-ar
          export LD=ld.lld
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export CROSS_COMPILE=aarch64-linux-gnu-
          export USE_CCACHE=1
          make O=out ARCH=arm64 cepheus_defconfig
          make ARCH=arm64 O=out CC=clang AR=llvm-ar LD=ld.lld NM=llvm-nm \
               OBJCOPY=llvm-objcopy OBJDUMP=llvm-objdump STRIP=llvm-strip \
               -j$(nproc --all) Image.gz-dtb
          ls out/arch/arm64/boot/Image.gz-dtb

      - name: Pack AnyKernel3
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/
          cd AnyKernel3 && zip -r9 ../EvoX_cepheus_vic_v3.2.0_KSUN.zip * -x README

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EvoX-cepheus-vic-v3.2.0-KSUN
          path: |
            EvoX_cepheus_vic_v3.2.0_KSUN.zip
            kernel/out/arch/arm64/boot/Image.gz-dtb
